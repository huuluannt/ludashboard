    <line x1="-20" y1="-60" x2="20" y2="-60" stroke-width="16"/>
    <line x1="-60" y1="-20" x2="-60" y2="20" stroke-width="16"/>
    <line x1="60" y1="-20" x2="60" y2="20" stroke-width="16"/>
